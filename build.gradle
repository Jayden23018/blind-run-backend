plugins {
	id 'java'
	id 'org.springframework.boot' version '3.4.4'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-data-redis'
	implementation 'org.springframework.boot:spring-boot-starter-websocket'
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.6'

	implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'

	// 阿里云号码认证服务 SDK（免资质签名，开箱即用）
	// credentials-java 由 SDK 自动传递引入，无需显式声明
	implementation 'com.aliyun:alibabacloud-dypnsapi20170525:2.0.0'
	// 阿里云金融级实人认证 SDK
	implementation 'com.aliyun:cloudauth20190307:2.1.1'

	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'com.mysql:mysql-connector-j'
	annotationProcessor 'org.projectlombok:lombok'

	// 测试依赖
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'com.h2database:h2'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	testCompileOnly 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'
	// 测试用 Jedis 替代 Lettuce，避免连接池不稳定
	testImplementation 'redis.clients:jedis'
	// Testcontainers：真实 Redis 容器
	testImplementation 'org.testcontainers:testcontainers:2.0.4'
	testImplementation 'org.testcontainers:testcontainers-junit-jupiter:2.0.4'
}

tasks.named('test') {
	useJUnitPlatform {
		excludeTags 'slow'
	}
}

task slowTest(type: Test) {
	useJUnitPlatform {
		includeTags 'slow'
	}
	testClassesDirs = sourceSets.test.output.classesDirs
	classpath = sourceSets.test.runtimeClasspath
}
