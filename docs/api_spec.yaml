              schema:
                type: object
  /api/volunteer/registration/step3/face-verify:
    post:
      tags:
      - volunteer-registration-controller
      summary: 人脸验证（Step 3）
      description: 上传自拍照片进行人脸比对
      operationId: faceVerify
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                facePhoto:
                  type: string
                  format: binary
                  description: 人脸自拍照片
              required:
              - facePhoto
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/volunteer/registration/step2/id-card:
    post:
      tags:
      - volunteer-registration-controller
      summary: 上传身份证（Step 2）
      description: multipart/form-data 格式，上传身份证正反面照片
      operationId: uploadIdCard
      parameters:
      - name: idCardName
        in: query
        description: 身份证姓名
        required: true
        schema:
          type: string
        example: 张三
      - name: idCardNumber
        in: query
        description: 身份证号码
        required: true
        schema:
          type: string
        example: 440305200001011234
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                frontFile:
                  type: string
                  format: binary
                  description: 身份证正面照片（人像面）
                backFile:
                  type: string
                  format: binary
                  description: 身份证背面照片（国徽面）
              required:
              - backFile
              - frontFile
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/volunteer/registration/step1:
    post:
      tags:
