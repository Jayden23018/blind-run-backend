                    type: boolean
                    example: true
                  phoneReusable:
                    type: boolean
                    example: true
                  allTokensInvalidated:
                    type: boolean
                    example: true
        '403':
          description: 只能注销自己的账号
        '409':
          description: 有进行中的订单，无法注销（errorCode=ACTIVE_ORDER_ACCOUNT_DELETION_BLOCKED）
