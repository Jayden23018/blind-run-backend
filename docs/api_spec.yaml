openapi: 3.1.0
info:
  title: 助盲跑 API
  description: 盲人陪跑志愿者匹配服务
  version: 1.0.0
servers:
- url: http://localhost:8081
  description: 本地开发环境
- url: http://47.114.113.171
  description: 阿里云生产环境（Swagger 已关闭，仅用于请求地址参考）
security:
- Bearer: []
tags:
- name: 盲人用户
  description: 盲人用户资料和身份认证接口
