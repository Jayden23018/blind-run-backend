  /api/volunteer/verification:
    post:
      tags:
      - volunteer-controller
      operationId: submitVerification
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 资质证件文件（图片或PDF）
              required:
              - file
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/volunteer/registration/training/quiz/answer:
    post:
      tags:
      - volunteer-registration-controller
      operationId: submitQuizAnswer
