      type: object
      properties:
        orderId:
          type: integer
          format: int64
        status:
          type: string
          description: 订单状态枚举名（IN_PROGRESS/DRIVER_EN_ROUTE/DRIVER_ARRIVED）
        plannedStartTime:
          type: string
          format: date-time
        plannedEndTime:
          type: string
          format: date-time
        startAddress:
          type: string
        startLatitude:
          type: number
          format: double
        startLongitude:
          type: number
          format: double
        blindName:
          type: string
        blindPhoneMasked:
          type: string
          description: 盲人手机号（已脱敏，如 138****0001）
        acceptedAt:
          type: string
          format: date-time
          nullable: true
    VolunteerDispatchRecentOrder:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        status:
          type: string
        plannedStartTime:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: 仅 COMPLETED 有值
        rating:
          type: integer
          nullable: true
          description: 该订单评分 1-5，无评价为 null
        startAddress:
          type: string
          description: 起跑点文字地址
        blindName:
          type: string
          description: 盲人姓名
    DispatchBlockReason:
      type: string
      description: 不可接单原因（前端引导优先级 REGISTRATION_INCOMPLETE>NOT_VERIFIED>DISPATCH_DISABLED>OFFLINE）
      enum:
      - DISPATCH_DISABLED
      - NOT_VERIFIED
      - REGISTRATION_INCOMPLETE
      - OFFLINE
