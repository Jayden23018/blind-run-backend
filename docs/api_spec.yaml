              schema:
                type: object
  /api/volunteer/dispatch-summary:
    get:
      tags:
      - volunteer-controller
      operationId: getDispatchSummary
      summary: 志愿者首页聚合数据（接单资格/在线位置/覆盖范围/时段/评分/订单）
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseObject'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/VolunteerDispatchSummaryResponse'
        '401':
          description: 未认证
        '403':
          description: 非志愿者角色
        '404':
          description: 志愿者资料不存在
