openapi: 3.1.0
info:
  title: 助盲跑 API
  description: 盲人陪跑志愿者匹配服务
  version: 1.0.0
servers:
- url: http://localhost:8081
  description: 本地开发环境
- url: http://47.114.113.171
  description: 阿里云生产环境（Swagger 已关闭，仅用于请求地址参考）
security:
- Bearer: []
tags:
- name: 盲人用户
  description: 盲人用户资料和身份认证接口
paths:
  /api/volunteer/profile:
    get:
      tags:
      - volunteer-controller
      operationId: getProfile
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/VolunteerProfileResponse'
    put:
      tags:
      - volunteer-controller
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolunteerProfileUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/users/{userId}/emergency-contacts/{contactId}:
    put:
      tags:
      - emergency-contact-controller
      operationId: updateContact
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: contactId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyContactRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/EmergencyContactResponse'
    delete:
      tags:
      - emergency-contact-controller
      operationId: deleteContact
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: contactId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/users/{userId}/emergency-contacts/{contactId}/set-primary:
    put:
      tags:
      - emergency-contact-controller
      operationId: setPrimary
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: contactId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/orders/{id}/keep-waiting:
    put:
      tags:
      - order-controller
      operationId: keepWaiting
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/emergency/{eventId}/volunteer-response:
    put:
      tags:
      - emergency-controller
      operationId: volunteerResponse
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: action
        in: query
        required: true
        schema:
          type: string
          enum:
          - FALSE_ALARM
          - NEED_HELP
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/cs/emergency-events/{eventId}/resolve:
    put:
      tags:
      - cs-controller
      operationId: resolveEvent
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: notes
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/cs/emergency-events/{eventId}/notify-contact:
    put:
      tags:
      - cs-controller
      operationId: notifyContact
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/cs/emergency-events/{eventId}/false-alarm:
    put:
      tags:
      - cs-controller
      operationId: markFalseAlarm
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/cs/emergency-events/{eventId}/accept:
    put:
      tags:
      - cs-controller
      operationId: acceptEvent
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/blind/profile:
    get:
      tags:
      - 盲人用户
      summary: 获取盲人资料
      operationId: getProfile_1
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/BlindProfileResponse'
    put:
      tags:
      - 盲人用户
      summary: 更新盲人资料
      operationId: updateProfile_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlindProfileUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
