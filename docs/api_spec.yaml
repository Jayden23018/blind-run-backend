              $ref: '#/components/schemas/TrainingCourseRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
    delete:
      tags:
      - admin-volunteer-controller
      operationId: deleteCourse
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
  /api/admin/notification-templates/{id}:
    put:
      tags:
      - admin-controller
      operationId: updateTemplate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationTemplateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
