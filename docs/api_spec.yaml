  /api/volunteer/registration/training/quiz/answer:
    post:
      tags:
      - volunteer-registration-controller
      summary: 提交单题测验答案
      description: >-
        逐题提交（非整卷）。每次提交后立即按"每题最新一次作答"重算整卷得分并返回，允许无限次重复作答。
        课程进度需 ≥95% 才能作答，否则 HTTP 400。失败均带 errorCode（TRAINING_NOT_STARTED /
        TRAINING_QUIZ_LOCKED / TRAINING_QUESTION_NOT_FOUND / TRAINING_QUESTION_COURSE_MISMATCH），
        前端可据此程序化判断，不必强依赖 message 文案。
      operationId: submitQuizAnswer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizAnswerRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseObject'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/QuizResultResponse'
        '400':
          description: >-
            题目学习未完成（进度<95%，errorCode=TRAINING_QUIZ_LOCKED）/ 尚未开始学习该课程（errorCode=TRAINING_NOT_STARTED）
            / 题目不存在（errorCode=TRAINING_QUESTION_NOT_FOUND）/ 题目不属于该课程（errorCode=TRAINING_QUESTION_COURSE_MISMATCH）
  /api/volunteer/registration/training/progress:
    post:
      tags:
      - volunteer-registration-controller
      summary: 提交学习进度
      description: >-
        progressPercent 由客户端计算提交，后端仅做反作弊校验（不可倒退、速率上限），不反算进度。
        达到 100 时课程状态置为 COMPLETED；若志愿者全部必修课均 COMPLETED，registrationStep
        自动推进为 STEP_4_COMPLETED（不校验测验是否通过）。
      operationId: submitTrainingProgress
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingProgressRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseObject'
                - type: object
                  properties:
                    data:
                      type: string
                      example: 进度已更新
        '400':
          description: >-
            课程不存在（errorCode=TRAINING_COURSE_NOT_FOUND）/ 注册步骤未到培训阶段（errorCode=TRAINING_STEP_NOT_REACHED）
            / 前置课程未完成（errorCode=TRAINING_PREREQUISITE_NOT_MET）/ 进度倒退（errorCode=TRAINING_PROGRESS_REGRESSION）
            / 提交速率异常（errorCode=TRAINING_PROGRESS_RATE_ANOMALY）/ 并发提交冲突需重试（errorCode=TRAINING_PROGRESS_CONFLICT）
  /api/volunteer/registration/step3/face-verify/init:
    post:
      tags:
      - volunteer-registration-controller
      summary: 发起动作活体认证（Step 3 - init）
      description: 提交 metaInfo（前端用阿里云 JS SDK 采集的设备指纹），调用阿里云
        InitFaceVerify（SMART 方案）返回 certifyId。客户端使用阿里云原生 App SDK
        （AliyunFaceAuthFacade.verify(certifyId)）直接完成动作活体，无需打开 URL，
        随后轮询 /step3/face-verify/result 获取结果。
      operationId: initFaceVerify
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceVerifyInitRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/FaceVerifyInitResponse'
  /api/volunteer/registration/step3/face-verify/result:
    post:
      tags:
      - volunteer-registration-controller
      summary: 查询动作活体认证结果（Step 3 - result）
      description: 根据 certifyId（须与当前用户绑定的 certifyId 一致，防越权）调用阿里云
        DescribeFaceVerify 查询认证结果。客户端在 init 返回后使用 App SDK
        （AliyunFaceAuthFacade.verify(certifyId)）完成动作活体，
        然后轮询本接口直到 status 变为 APPROVED 或 REJECTED。
      operationId: queryFaceVerifyResult
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceVerifyResultRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
