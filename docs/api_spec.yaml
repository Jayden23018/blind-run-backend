  /api/orders/{id}/start:
    post:
      tags:
      - order-controller
      summary: 志愿者确认开始服务（DRIVER_ARRIVED → IN_PROGRESS）
      description: 志愿者到达后确认开始服务，由志愿者触发。前端移除盲人端"确认开始服务"按钮后，改由此接口替代。
      operationId: startService
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: object
        '403':
          description: 非订单参与者
        '409':
          description: 订单状态不允许此操作
  /api/orders/{id}/finish:
    post:
      tags:
      - order-controller
