    VolunteerDispatchSummaryResponse:
      type: object
      description: 志愿者首页聚合响应
      properties:
        canDispatch:
          type: boolean
          description: 系统判定当前是否可被派单
        notAvailableReasons:
          type: array
          description: 不可接单的结构化原因（canDispatch=true 时为空数组）
          items:
            $ref: '#/components/schemas/DispatchBlockReason'
        wantsDispatch:
          type: boolean
          description: 用户接单开关状态（用户意愿）
        isOnline:
          type: boolean
          description: WebSocket 在线状态
        lastLat:
          type: number
          format: double
          nullable: true
          description: 最近位置纬度（离线时为 null）
        lastLng:
          type: number
          format: double
          nullable: true
          description: 最近位置经度（离线时为 null）
        lastLocationAt:
          type: string
          format: date-time
          nullable: true
          description: 最近位置更新时间（离线时为 null）
        coverageRadiusKm:
          type: integer
          description: 可接单覆盖圆半径（km，当前固定 10）
        isWithinServiceTime:
          type: boolean
          description: 当前是否在可服务时段内（仅 UI 提示，不阻断接单）
        availableTimeSlots:
          type: array
          items:
            $ref: '#/components/schemas/VolunteerAvailableTimeSlot'
        avgRating:
          type: number
          format: double
          nullable: true
          description: 平均评分 1.0-5.0（null=无评价）
        totalRatings:
          type: integer
        totalDispatched:
          type: integer
        totalAccepted:
          type: integer
          description: 累计接单次数（点了 ACCEPT 就算，含接了没跑完的）
        totalCompleted:
          type: integer
          description: 累计完成订单次数（订单走到 COMPLETED 才算）
        totalDeclined:
          type: integer
          description: 累计拒单次数（不含超时）
        totalTimeout:
          type: integer
          description: 累计响应超时次数（不计入接单率分母）
        acceptanceRate:
          type: number
          format: double
          nullable: true
          description: 接单率 0.0-1.0（null=无派单记录）
        activeOrders:
          type: array
          items:
            $ref: '#/components/schemas/VolunteerDispatchActiveOrder'
        recentOrders:
          type: array
          items:
            $ref: '#/components/schemas/VolunteerDispatchRecentOrder'
