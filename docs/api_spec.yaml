        注销账号（软删除）。只能注销自己（否则 403）；有进行中订单会被拦截
        （409 + errorCode=ACTIVE_ORDER_ACCOUNT_DELETION_BLOCKED）。
        成功后立即撤销该账户全部 token（与登出的单 token 撤销不同），
        原手机号释放可供重新注册。
      parameters:
      - name: id
