          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmergencyContactResponse'
    post:
      tags:
      - emergency-contact-controller
      operationId: addContact
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
