components:
  schemas:
    VolunteerAvailableTimeSlot:
      type: object
      properties:
        dayOfWeek:
          type: string
          minLength: 1
          pattern: MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY|SUNDAY
        startTime:
          type: string
          example: '14:30:00'
        endTime:
          type: string
          example: '14:30:00'
      required:
      - endTime
      - startTime
    VolunteerProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 2
        availableTimeSlots:
          type: array
          items:
            $ref: '#/components/schemas/VolunteerAvailableTimeSlot'
        acceptsGuideDog:
          type: boolean
        paceRange:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
        isAvailable:
          type: boolean
          description: 可服务状态（可选，不传则不修改）
    EmergencyContactRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 0
        phone:
          type: string
          maxLength: 20
          minLength: 0
        relationship:
          type: string
          maxLength: 20
          minLength: 0
        isPrimary:
          type: boolean
    EmergencyContactResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string
        relationship:
          type: string
        isPrimary:
          type: boolean
    BlindProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 2
        runningPace:
          type: string
          maxLength: 20
          minLength: 0
        specialNeeds:
          type: string
          maxLength: 500
          minLength: 0
        visionLevel:
          type: string
          enum:
          - TOTAL_BLIND
          - LOW_VISION
        hasGuideDog:
          type: boolean
        tetherPreference:
          type: string
          enum:
          - TETHER_ROPE
          - ARM_HOLD
          - VERBAL_ONLY
        chatPreference:
          type: string
          enum:
          - PREFER_CHAT
          - PREFER_QUIET
          - NO_PREFERENCE
        defaultPace:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
    QuizQuestionRequest:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        questionText:
          type: string
          minLength: 1
        questionType:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 1
        correctAnswer:
          type: array
          items:
            type: string
          minItems: 1
        explanation:
          type: string
        displayOrder:
          type: integer
          format: int32
      required:
      - courseId
      - displayOrder
      - questionType
    TrainingCourseRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
          minimum: 1
        videoUrl:
          type: string
        content:
          type: string
        displayOrder:
          type: integer
          format: int32
          minimum: 0
        isActive:
          type: boolean
      required:
      - displayOrder
      - durationMinutes
    UpdateNotificationTemplateRequest:
      type: object
      properties:
        templateText:
          type: string
          minLength: 1
        ttsText:
          type: string
    QuizAnswerRequest:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        questionId:
          type: integer
          format: int64
        answers:
          type: array
          items:
            type: string
          minItems: 1
        timeSpentSeconds:
          type: integer
          format: int32
      required:
      - courseId
      - questionId
      - timeSpentSeconds
    TrainingProgressRequest:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        progressPercent:
          type: integer
          format: int32
          maximum: 100
          minimum: 0
        lastPositionSeconds:
          type: integer
          format: int32
          minimum: 0
        timeSpentSeconds:
          type: integer
          format: int32
          minimum: 0
      required:
      - courseId
      - lastPositionSeconds
      - progressPercent
      - timeSpentSeconds
    BasicInfoRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 2
        phone:
          type: string
          minLength: 1
          pattern: ^1[3-9]\d{9}$
        runningExperience:
          type: string
        hasGuidedBefore:
          type: boolean
        emergencyExperience:
          type: string
    VolunteerLocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
          maximum: 90
          minimum: -90
        longitude:
          type: number
          format: double
          maximum: 180
          minimum: -180
        isOnline:
          type: boolean
      required:
      - latitude
      - longitude
    SetRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum:
          - UNSET
          - BLIND
          - VOLUNTEER
      required:
      - role
    CreateOrderRequest:
      type: object
      properties:
        startLatitude:
          type: number
          format: double
          maximum: 90
          minimum: -90
        startLongitude:
          type: number
          format: double
          maximum: 180
          minimum: -180
        startAddress:
          type: string
        plannedStartTime:
          type: string
          format: date-time
        plannedEndTime:
          type: string
          format: date-time
        expectedDurationMinutes:
          type: integer
          format: int32
          maximum: 300
          minimum: 10
        pacePreference:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
        routePreference:
          type: string
          enum:
          - PARK_TRAIL
          - STREET
          - TRACK
          - NO_PREFERENCE
        routeNotes:
          type: string
          maxLength: 200
          minLength: 0
        hasGuideDogThisRun:
          type: boolean
        specialNotes:
          type: string
          maxLength: 200
          minLength: 0
      required:
      - plannedEndTime
      - plannedStartTime
      - startAddress
      - startLatitude
      - startLongitude
    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING_MATCH
          - PENDING_ACCEPT
          - IN_PROGRESS
          - DRIVER_EN_ROUTE
          - DRIVER_ARRIVED
          - COMPLETED
          - CANCELLED
          - REMATCHING
          - NO_VOLUNTEER
        message:
          type: string
    CallInitiateRequest:
      type: object
      properties:
        callerRole:
          type: string
          enum:
          - BLIND_USER
          - VOLUNTEER
      required:
      - callerRole
    CreateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          format: int32
          maximum: 5
          minimum: 1
        comment:
          type: string
      required:
      - rating
    DispatchRespondRequest:
      type: object
      properties:
        action:
          type: string
          enum:
          - ACCEPT
          - DECLINE
      required:
      - action
    EmergencyTriggerRequest:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        gpsLat:
          type: number
          maximum: 90
          minimum: -90
        gpsLng:
          type: number
          maximum: 180
          minimum: -180
      required:
      - orderId
    CsLoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    BlindVerifyRequest:
      type: object
      properties:
        idCardName:
          type: string
          maxLength: 50
          minLength: 2
        idCardNumber:
          type: string
          minLength: 1
          pattern: ^\d{17}[\dXx]$
    BlindLocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
          maximum: 90
          minimum: -90
        longitude:
          type: number
          format: double
          maximum: 180
          minimum: -180
      required:
      - latitude
      - longitude
    VerifyCodeRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
          pattern: ^1[3-9]\d{9}$
        code:
          type: string
          minLength: 1
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        userId:
          type: integer
          format: int64
        role:
          type: string
    SendCodeRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
          pattern: ^1[3-9]\d{9}$
    IdReviewRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        approved:
          type: boolean
        rejectionReason:
          type: string
      required:
      - approved
      - userId
    VolunteerProfileResponse:
      type: object
      properties:
        name:
          type: string
        verificationStatus:
          type: string
        availableTimeSlots:
          type: array
          items:
            $ref: '#/components/schemas/VolunteerAvailableTimeSlot'
        acceptsGuideDog:
          type: boolean
        paceRange:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
        isAvailable:
          type: boolean
          description: 可服务状态，false 时不参与派单也不能接单
    CallRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        callerId:
          type: integer
          format: int64
        callerRole:
          type: string
          enum:
          - BLIND_USER
          - VOLUNTEER
        calleeId:
          type: integer
          format: int64
        calleeRole:
          type: string
          enum:
          - BLIND_USER
          - VOLUNTEER
        virtualNumber:
          type: string
        status:
          type: string
          enum:
          - INITIATED
          - CONNECTED
          - FAILED
          - NOT_AVAILABLE
        initiatedAt:
          type: string
          format: date-time
        connectedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
    OrderDetailResponse:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING_MATCH
          - PENDING_ACCEPT
          - IN_PROGRESS
          - DRIVER_EN_ROUTE
          - DRIVER_ARRIVED
          - COMPLETED
          - CANCELLED
          - REMATCHING
          - NO_VOLUNTEER
        startAddress:
          type: string
        plannedStart:
          type: string
          format: date-time
        plannedEnd:
          type: string
          format: date-time
        volunteerPhone:
          type: string
        acceptedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        expectedDurationMinutes:
          type: integer
          format: int32
        pacePreference:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
        routePreference:
          type: string
          enum:
          - PARK_TRAIL
          - STREET
          - TRACK
          - NO_PREFERENCE
        routeNotes:
          type: string
        hasGuideDogThisRun:
          type: boolean
        specialNotes:
          type: string
        visionLevel:
          type: string
          enum:
          - TOTAL_BLIND
          - LOW_VISION
        tetherPreference:
          type: string
          enum:
          - TETHER_ROPE
          - ARM_HOLD
          - VERBAL_ONLY
        chatPreference:
          type: string
          enum:
          - PREFER_CHAT
          - PREFER_QUIET
          - NO_PREFERENCE
    OrderStatusLogResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        fromStatus:
          type: string
        toStatus:
          type: string
        changedBy:
          type: integer
          format: int64
        changedAt:
          type: string
          format: date-time
        remark:
          type: string
    PageOrderDetailResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderDetailResponse'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
        offset:
          type: integer
          format: int64
        sort:
          $ref: '#/components/schemas/SortObject'
    SortObject:
      type: object
      properties:
        sorted:
          type: boolean
        unsorted:
          type: boolean
        empty:
          type: boolean
    ApiResponseObject:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: integer
          format: int32
        message:
          type: string
        data:
          type: object
    BlindProfileResponse:
      type: object
      properties:
        name:
          type: string
        runningPace:
          type: string
        specialNeeds:
          type: string
        verifyStatus:
          type: string
          enum:
          - NOT_VERIFIED
          - VERIFIED
          - FAILED
        visionLevel:
          type: string
          enum:
          - TOTAL_BLIND
          - LOW_VISION
        hasGuideDog:
          type: boolean
        tetherPreference:
          type: string
          enum:
          - TETHER_ROPE
          - ARM_HOLD
          - VERBAL_ONLY
        chatPreference:
          type: string
          enum:
          - PREFER_CHAT
          - PREFER_QUIET
          - NO_PREFERENCE
        defaultPace:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
  securitySchemes:
    Bearer:
      type: http
      name: Authorization
      scheme: bearer
      bearerFormat: JWT
