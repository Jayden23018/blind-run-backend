components:
  schemas:
    VolunteerAvailableTimeSlot:
      type: object
      properties:
        dayOfWeek:
          type: string
          minLength: 1
          pattern: MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY|SUNDAY
        startTime:
          type: string
          example: '14:30:00'
        endTime:
          type: string
          example: '14:30:00'
      required:
      - endTime
      - startTime
    VolunteerProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 2
        availableTimeSlots:
          type: array
          items:
            $ref: '#/components/schemas/VolunteerAvailableTimeSlot'
        acceptsGuideDog:
          type: boolean
        paceRange:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
    EmergencyContactRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 0
        phone:
          type: string
          maxLength: 20
          minLength: 0
        relationship:
          type: string
          maxLength: 20
          minLength: 0
        isPrimary:
          type: boolean
    EmergencyContactResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string
          description: 明文电话（v1.5.0，本人读取不再掩码，前端展示层自行脱敏）
        relationship:
          type: string
        isPrimary:
          type: boolean
    BlindProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 2
        runningPace:
          type: string
          maxLength: 20
          minLength: 0
        specialNeeds:
          type: string
          maxLength: 500
          minLength: 0
        visionLevel:
          type: string
          enum:
          - TOTAL_BLIND
          - LOW_VISION
        hasGuideDog:
          type: boolean
        tetherPreference:
          type: string
          enum:
          - TETHER_ROPE
          - ARM_HOLD
          - VERBAL_ONLY
        chatPreference:
          type: string
          enum:
          - PREFER_CHAT
          - PREFER_QUIET
          - NO_PREFERENCE
        defaultPace:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
    QuizQuestionRequest:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        questionText:
          type: string
          minLength: 1
        questionType:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 1
        correctAnswer:
          type: array
          items:
            type: string
          minItems: 1
        explanation:
          type: string
        displayOrder:
          type: integer
          format: int32
      required:
      - courseId
      - displayOrder
      - questionType
    TrainingCourseRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
          minimum: 1
        videoUrl:
          type: string
        content:
          type: string
        displayOrder:
          type: integer
          format: int32
          minimum: 0
        isActive:
          type: boolean
      required:
      - displayOrder
      - durationMinutes
    UpdateNotificationTemplateRequest:
      type: object
      properties:
        templateText:
          type: string
          minLength: 1
        ttsText:
          type: string
    QuizAnswerRequest:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        questionId:
          type: integer
          format: int64
        answers:
          type: array
          items:
            type: string
          minItems: 1
        timeSpentSeconds:
          type: integer
          format: int32
      required:
      - courseId
      - questionId
      - timeSpentSeconds
    TrainingProgressRequest:
      type: object
      description: >-
        progressPercent 由客户端计算并直接提交（后端不反算），仅用于反作弊校验：不允许倒退（除非提交
        100 完成态，可重复提交），且提交速率不能超过约 10 倍正常观看速度，否则 400。
      properties:
        courseId:
          type: integer
          format: int64
        progressPercent:
          type: integer
          format: int32
          maximum: 100
          minimum: 0
        lastPositionSeconds:
          type: integer
          format: int32
          minimum: 0
        timeSpentSeconds:
          type: integer
          format: int32
          minimum: 0
      required:
      - courseId
      - lastPositionSeconds
      - progressPercent
      - timeSpentSeconds
    TrainingCourseResponse:
      type: object
      description: content 为 HTML 富文本；videoUrl 为空时前端应渲染 content，非空时优先播放视频。
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
        videoUrl:
          type: string
          nullable: true
        content:
          type: string
          description: HTML 富文本课程内容
        displayOrder:
          type: integer
          format: int32
        isRequired:
          type: boolean
          description: 当前所有课程均为必修，恒为 true
        progressStatus:
          type: string
          enum:
          - NOT_STARTED
          - IN_PROGRESS
          - COMPLETED
        progressPercent:
          type: integer
          format: int32
        isCompleted:
          type: boolean
        canTakeQuiz:
          type: boolean
          description: progressPercent >= 95 才为 true，即测验是否已解锁
        quizLockedReason:
          type: string
          nullable: true
          description: canTakeQuiz=false 时的原因说明，可直接展示给用户；已解锁时为 null
    QuizQuestionResponse:
      type: object
      description: >-
        options 为打乱顺序后的完整选项文本（非字母码）；提交答案时 QuizAnswerRequest.answers
        必须精确等于本接口返回的 options 原文字符串，而非 "A"/"B" 字母。
      properties:
        id:
          type: integer
          format: int64
        courseId:
          type: integer
          format: int64
        questionText:
          type: string
        questionType:
          type: string
          enum:
          - SINGLE_CHOICE
          - MULTIPLE_CHOICE
        options:
          type: array
          items:
            type: string
        attemptCount:
          type: integer
          format: int32
          description: 该题目此前已作答次数（不限制上限，仅供展示）
        displayOrder:
          type: integer
          format: int32
    QuestionResult:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
        questionText:
          type: string
        correct:
          type: boolean
        explanation:
          type: string
    QuizResultResponse:
      type: object
      description: >-
        每次逐题提交后返回按"每题最新一次作答"聚合的整卷结果；及格线 60%，不限答题次数
        （remainingAttempts 恒为 -1，表示无限次）。
      properties:
        passed:
          type: boolean
        correctCount:
          type: integer
          format: int32
        totalQuestions:
          type: integer
          format: int32
        scorePercent:
          type: integer
          format: int32
        questionResults:
          type: array
          items:
            $ref: '#/components/schemas/QuestionResult'
        remainingAttempts:
          type: integer
          format: int32
          description: 恒为 -1（无限次答题机会），非真实剩余次数计数
    BasicInfoRequest:
      type: object
      description: >-
        志愿者基本信息（Step 1）。提交时自动触发阿里云 Id2Meta 二要素核验（idCardName + idCardNumber）。
        核验通过则推进到 Step 3 动作活体认证；核验未通过则保持 STEP_1_BASIC_INFO 并返回
        HTTP 400 加 errorCode ID_INFO_INVALID（前端停留 Step1 引导修改）。后端自动 trim 并将
        身份证号末位 X 统一大写。原 Step 2 身份证照片上传已下线。
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 2
        phone:
          type: string
          minLength: 1
          pattern: ^1[3-9]\d{9}$
        idCardName:
          type: string
          minLength: 2
          maxLength: 50
          description: 身份证姓名（提交即触发二要素核验）
          example: 张三
        idCardNumber:
          type: string
          minLength: 1
          pattern: ^\d{17}[\dXx]$
          description: 身份证号码（18 位，末位可为 X）
          example: 440305200001011234
        runningExperience:
          type: string
        hasGuidedBefore:
          type: boolean
        emergencyExperience:
          type: string
      required:
      - name
      - phone
      - idCardName
      - idCardNumber
    FaceVerifyInitRequest:
      type: object
      description: 发起动作活体认证请求。metaInfo 由前端用阿里云 JS SDK 采集的设备指纹（JSON 字符串）。
      properties:
        metaInfo:
          type: string
          minLength: 1
          description: 阿里云活体 SDK 采集的设备指纹
      required:
      - metaInfo
    FaceVerifyInitResponse:
      type: object
      description: 发起动作活体认证响应。status 取值 PENDING（已发起，客户端用 App SDK 完成动作活体）/ ERROR（发起失败）。
      properties:
        certifyId:
          type: string
          nullable: true
          description: 本次认证的唯一 ID（PENDING 时非空），客户端用阿里云 App SDK（AliyunFaceAuthFacade.verify）消费；后续查询结果时回传
        certifyUrl:
          type: string
          nullable: true
          description: 恒为 null——App SDK 场景阿里云不返回该字段，仅历史 H5/Web 场景使用，客户端无需处理
        status:
          type: string
          enum:
          - PENDING
          - ERROR
        message:
          type: string
      required:
      - status
    FaceVerifyResultRequest:
      type: object
      description: 查询动作活体认证结果请求。certifyId 须与当前用户绑定的 certifyId 一致（防越权）。
      properties:
        certifyId:
          type: string
          minLength: 1
          description: init 接口返回的 certifyId
      required:
      - certifyId
    FaceVerifyResultResponse:
      type: object
      description: 动作活体认证结果响应。status 取值 APPROVED（通过）/ REJECTED（失败，可重试）/ PENDING（进行中，前端继续轮询）。
      properties:
        passed:
          type: boolean
          description: 是否通过（status == APPROVED 时为 true）
        status:
          type: string
          enum:
          - APPROVED
          - REJECTED
          - PENDING
        message:
          type: string
      required:
      - passed
      - status
    VolunteerLocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
          maximum: 90
          minimum: -90
        longitude:
          type: number
          format: double
          maximum: 180
          minimum: -180
        isOnline:
          type: boolean
      required:
      - latitude
      - longitude
    SetRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum:
          - UNSET
          - BLIND
          - VOLUNTEER
      required:
      - role
    CreateOrderRequest:
      type: object
      properties:
        startLatitude:
          type: number
          format: double
          maximum: 90
          minimum: -90
        startLongitude:
          type: number
          format: double
          maximum: 180
          minimum: -180
        startAddress:
          type: string
        plannedStartTime:
          type: string
          format: date-time
        plannedEndTime:
          type: string
          format: date-time
        expectedDurationMinutes:
          type: integer
          format: int32
          maximum: 300
          minimum: 10
        pacePreference:
          type: string
          enum:
          - WALK_RUN
          - EASY
          - MODERATE
          - FAST
          - NO_PREFERENCE
        routePreference:
          type: string
          enum:
          - PARK_TRAIL
          - STREET
          - TRACK
          - NO_PREFERENCE
        routeNotes:
          type: string
          maxLength: 200
          minLength: 0
        hasGuideDogThisRun:
          type: boolean
        specialNotes:
          type: string
          maxLength: 200
          minLength: 0
      required:
      - plannedEndTime
      - plannedStartTime
      - startAddress
      - startLatitude
      - startLongitude
    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING_MATCH
          - PENDING_ACCEPT
          - IN_PROGRESS
          - DRIVER_EN_ROUTE
          - DRIVER_ARRIVED
          - COMPLETED
          - CANCELLED
          - REMATCHING
          - NO_VOLUNTEER
        message:
          type: string
    CallInitiateRequest:
      type: object
      properties:
        callerRole:
          type: string
          enum:
          - BLIND_USER
          - VOLUNTEER
      required:
      - callerRole
    CreateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          format: int32
          maximum: 5
          minimum: 1
        comment:
          type: string
      required:
      - rating
    DispatchRespondRequest:
      type: object
      properties:
        action:
          type: string
          enum:
          - ACCEPT
          - DECLINE
      required:
      - action
    EmergencyTriggerRequest:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        gpsLat:
