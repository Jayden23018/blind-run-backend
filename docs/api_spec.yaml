  /api/volunteer/profile:
    get:
      tags:
      - volunteer-controller
      operationId: getProfile
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/VolunteerProfileResponse'
    put:
      tags:
      - volunteer-controller
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolunteerProfileUpdateRequest'
        required: true
      responses:
        '200':
