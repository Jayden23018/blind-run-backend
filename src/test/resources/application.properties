# Rate limiting disabled for tests
rate-limit.enabled=false

# JWT test secret (at least 32 bytes)
jwt.secret=TestSecretKeyForJwtTokenGenerationThatShouldBeAtLeast32BytesLong

# CORS allowed origins for tests
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Aliyun ID verification test config
aliyun.credentials.access-key-id=test-ak
aliyun.credentials.access-key-secret=test-sk
aliyun.cloudauth.scene-id=test-scene-id
aliyun.cloudauth.endpoint=cloudauth.cn-shanghai.aliyuncs.com
aliyun.sms.sign-name=test
aliyun.sms.template-code.verify=SMS_190070387
aliyun.sms.template-code.emergency-alert=SMS_505635057
aliyun.sms.template-code.contact-added=SMS_505950033
aliyun.sms.template-code.emergency-resolved=SMS_505880026
rate-limit.auth.max-requests=10
rate-limit.auth.window-seconds=60
rate-limit.registration.max-requests=20
rate-limit.registration.window-seconds=60
rate-limit.general.max-requests=60
rate-limit.general.window-seconds=60

# 测试使用本地文件存储
app.storage.type=local
app.upload.dir=/tmp/blindrun-test-uploads/

# 派单测试配置（超时缩短加速测试）
app.dispatch.per-volunteer-timeout-seconds=5
app.dispatch.total-timeout-before-start-minutes=5
app.dispatch.round1-distance-km=5
app.dispatch.round2-distance-km=10
app.dispatch.round3-distance-km=20
app.dispatch.round1-time-overlap=0.8
app.dispatch.round2-time-overlap=0.6
app.dispatch.scheduler-poll-interval-ms=2000
