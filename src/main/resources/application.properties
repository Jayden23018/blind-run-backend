spring.application.name=demo
server.port=8081

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:spring_demo}?zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
# ddl-auto=update: Hibernate 会根据实体类自动更新数据库表结构
# show-sql=true: 在控制台打印执行的 SQL 语句，方便调试
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
# 初始化数据（data.sql 在 Hibernate 建表后执行）
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# ========================================
# 短信验证码配置
# ========================================
# 短信服务提供商（mock=模拟，控制台输出；aliyun=阿里云真实短信）
# 使用阿里云号码认证服务进行测试
sms.provider=aliyun
# 验证码位数（默认6位）
sms.code.length=6
# 验证码有效期（分钟，默认5分钟）
sms.code.ttl-minutes=5
# 验证码最大尝试次数（超过后验证码失效，需重新发送）
sms.code.max-attempts=5

# 阿里云短信服务配置（自定义签名+模板）
aliyun.credentials.access-key-id=${ALIYUN_ACCESS_KEY_ID:}
aliyun.credentials.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET:}
aliyun.sms.sign-name=${ALIYUN_SMS_SIGN_NAME:}
aliyun.sms.template-code.verify=SMS_190070387
aliyun.sms.template-code.emergency-alert=SMS_505635057
aliyun.sms.template-code.contact-added=SMS_505950033
aliyun.sms.template-code.emergency-resolved=SMS_505880026
# 阿里云金融级实人认证配置
aliyun.cloudauth.scene-id=${ALIYUN_CLOUDAUTH_SCENE_ID:1000018059}
aliyun.cloudauth.endpoint=cloudauth.aliyuncs.com
# 阿里云 OSS 配置
aliyun.oss.endpoint=oss-cn-shenzhen.aliyuncs.com
aliyun.oss.bucket-name=zhumangpao
# OSS 访问密钥（复用阿里云通用密钥，生产环境可通过独立 RAM 用户隔离）
aliyun.oss.access-key-id=${ALIYUN_ACCESS_KEY_ID:}
aliyun.oss.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET:}
# 文件存储实现：local（本地磁盘）或 oss（阿里云 OSS）
app.storage.type=${STORAGE_TYPE:oss}

# ========================================
# Redis 配置
# ========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

# ========================================
# JWT 配置
# ========================================
# JWT 签名密钥（必须至少 32 字节，生产环境必须通过环境变量 JWT_SECRET 设置强随机密钥）
# 下面的默认值仅供本地开发，请勿在生产环境使用
jwt.secret=${JWT_SECRET:DevOnlySecretKey_DoNotUseInProd_2024!@#$RandomBytes}
# Token 过期时间（毫秒，默认 24 小时）
jwt.expiration=86400000

# ========================================
# CORS 跨域配置
# ========================================
# 允许的前端域名，逗号分隔（生产环境必须替换为实际域名）
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ========================================
# 盲人陪跑匹配配置
# ========================================
# 匹配最大距离（公里）
app.matching.max-distance-km=10
# 匹配最大候选人数（最多推送给几名志愿者）
app.matching.max-candidates=3

# ========================================
# 串行派单配置
# ========================================
# 每位志愿者等待回应的超时时间（秒）
app.dispatch.per-volunteer-timeout-seconds=30
# 总超时：跑步开始前多少分钟停止派单
app.dispatch.total-timeout-before-start-minutes=30
# 派单轮次距离阈值（公里）
app.dispatch.round1-distance-km=5
app.dispatch.round2-distance-km=10
app.dispatch.round3-distance-km=20
# 各轮次最低时间重叠率
app.dispatch.round1-time-overlap=0.8
app.dispatch.round2-time-overlap=0.6
# 派单定时任务轮询间隔（毫秒）
app.dispatch.scheduler-poll-interval-ms=5000
# WebSocket 端点路径
app.websocket.endpoint=/ws/volunteer
app.websocket.blind-endpoint=/ws/blind
# 志愿者位置 Redis TTL（秒，超过此时间未更新视为离线）
app.volunteer.location-ttl-seconds=30

# ========================================
# 文件上传配置
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/tmp/blindrun-uploads/

# ========================================
# 邻近感知配置
# ========================================
app.proximity.threshold-meters=100

# ========================================
# 紧急事件配置
# ========================================
app.emergency.cooldown-seconds=60
app.emergency.volunteer-timeout-seconds=30

# ========================================
# 隐私号通话配置
# ========================================
aliyun.private-number.enabled=false

# ========================================
# 速率限制配置
# ========================================
rate-limit.enabled=true
rate-limit.auth.max-requests=10
rate-limit.auth.window-seconds=60
rate-limit.registration.max-requests=20
rate-limit.registration.window-seconds=60
rate-limit.general.max-requests=60
rate-limit.general.window-seconds=60

# ========================================
# Springdoc OpenAPI
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.operations-sorter=alpha
