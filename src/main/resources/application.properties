spring.application.name=demo
server.port=8081
# Trust X-Forwarded-* from Nginx via Tomcat RemoteIpValve (required for real client IP in rate limiting)
server.forward-headers-strategy=native

# Actuator：仅暴露 health（不暴露 env/beans 等敏感端点），show-details=never 只返回 {"status":"UP/DOWN"}
# 部署脚本用它做健康检查——比探 Swagger 更准，因为 DataSource/Redis HealthIndicator 会自动注册，能测出真实的 DB/Redis 连通性
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:spring_demo}?zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
# maximum-pool-size: 最大连接数，公式 = CPU核数 × 2 + 磁盘数
# 2核服务器最优值 = 10；50连接会让MySQL在2核上疯狂切换，反而更慢
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
# minimum-idle: 空闲时保持的最小连接数，减少冷启动延迟
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
# connection-timeout: 从池中获取连接的最长等待时间（ms），超时抛异常而非无限等待
spring.datasource.hikari.connection-timeout=30000
# idle-timeout: 连接空闲超过此时间后被回收（ms），10 分钟
spring.datasource.hikari.idle-timeout=600000
# max-lifetime: 连接最长存活时间（ms），30 分钟，需小于 MySQL wait_timeout（默认 8 小时）
spring.datasource.hikari.max-lifetime=1800000
# keepalive-time: 定期发送 keepalive 防止连接被防火墙断开（ms），5 分钟
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.pool-name=BlindRunHikariPool

# JPA 配置
# ddl-auto=update: Hibernate 会根据实体类自动更新数据库表结构
# show-sql: 生产环境必须关闭，否则每条SQL都写日志，磁盘I/O拖慢整个服务
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
# 初始化数据（data.sql 在 Hibernate 建表后执行）
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# ========================================
# 短信验证码配置
# ========================================
# 短信服务提供商（mock=模拟，控制台输出；aliyun=阿里云真实短信）
# 使用阿里云号码认证服务进行测试
sms.provider=aliyun
# 验证码位数（默认6位）
sms.code.length=6
# 验证码有效期（分钟，默认5分钟）
sms.code.ttl-minutes=5
# 验证码最大尝试次数（超过后验证码失效，需重新发送）
sms.code.max-attempts=5

# 阿里云短信服务配置（自定义签名+模板）
aliyun.credentials.access-key-id=${ALIYUN_ACCESS_KEY_ID:}
aliyun.credentials.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET:}
aliyun.sms.sign-name=${ALIYUN_SMS_SIGN_NAME:}
aliyun.sms.template-code.verify=SMS_190070387
aliyun.sms.template-code.emergency-alert=SMS_505635057
aliyun.sms.template-code.contact-added=SMS_505950033
aliyun.sms.template-code.emergency-resolved=SMS_505880026
# 阿里云金融级实人认证配置
aliyun.cloudauth.scene-id=${ALIYUN_CLOUDAUTH_SCENE_ID:1000018059}
aliyun.cloudauth.endpoint=cloudauth.aliyuncs.com
# 动作活体认证（志愿者 step3）：aliyun=真实阿里云 InitFaceVerify/SMART；test=测试桩
face-verify.provider=aliyun
# 动作活体 sceneId（SMART 方案，需在阿里云控制台单独新建，区别于上面的 ContrastFaceVerify scene）
app.face-verify.scene-id=${ALIYUN_CLOUDAUTH_SMART_SCENE_ID:1000018059}
# 动作活体完成后前端回跳地址
app.face-verify.return-url=${FACE_VERIFY_RETURN_URL:https://zhumangpao.example.com/volunteer/registration/face-verify/callback}
# 阿里云 OSS 配置
aliyun.oss.endpoint=oss-cn-shenzhen.aliyuncs.com
aliyun.oss.bucket-name=zhumangpao
# OSS 访问密钥（复用阿里云通用密钥，生产环境可通过独立 RAM 用户隔离）
aliyun.oss.access-key-id=${ALIYUN_ACCESS_KEY_ID:}
aliyun.oss.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET:}

# 高德地图 Web 服务（逆地理编码：紧急短信文字地址；未配置则降级为可读经纬度）
amap.web.key=${AMAP_WEB_KEY:}
# 文件存储实现：local（本地磁盘）或 oss（阿里云 OSS）
app.storage.type=${STORAGE_TYPE:oss}

# ========================================
# Redis 配置
# ========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms

# Lettuce 连接池（C5/C7：提升连接可靠性，Sentinel 模式下必须配置）
# max-active：最大连接数；max-wait：获取连接的最长等待时间，超时报错而非无限等待
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX:20}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN:5}
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.max-wait=3000ms

# ========================================
# Redis 高可用配置 —— Sentinel 哨兵模式（C7）
# ========================================
# 当前为单机模式（开发/测试）。生产多实例部署时，取消下面注释并填写实际地址：
#
# spring.data.redis.sentinel.master=${REDIS_SENTINEL_MASTER:mymaster}
# spring.data.redis.sentinel.nodes=${REDIS_SENTINEL_NODES:host1:26379,host2:26379,host3:26379}
#
# 同时在 Redis 服务端 redis.conf 中配置持久化（C5）：
#   appendonly yes          # 启用 AOF，每秒 fsync，宕机最多丢失 1 秒数据
#   appendfsync everysec
#   save 900 1              # 兜底 RDB 快照
#
# 哨兵部署最小配置：1 主 + 2 从 + 3 哨兵节点（哨兵节点需奇数以完成选主投票）

# ========================================
# JWT 配置
# ========================================
# JWT 签名密钥（必须至少 32 字节，生产环境必须通过环境变量 JWT_SECRET 设置强随机密钥）
# 下面的默认值仅供本地开发，请勿在生产环境使用
jwt.secret=${JWT_SECRET:DevOnlySecretKey_DoNotUseInProd_2024!@#$RandomBytes}
# Token 过期时间（毫秒，默认 24 小时）
jwt.expiration=86400000

# ========================================
# CORS 跨域配置
# ========================================
# 允许的前端域名，逗号分隔（生产环境必须替换为实际域名）
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ========================================
# 盲人陪跑匹配配置
# ========================================
# 匹配最大距离（公里）
app.matching.max-distance-km=10
# 匹配最大候选人数（最多推送给几名志愿者）
app.matching.max-candidates=3

# ========================================
# 串行派单配置
# ========================================
# 每位志愿者等待回应的超时时间（秒）
app.dispatch.per-volunteer-timeout-seconds=30
# 总超时：跑步开始前多少分钟停止派单
app.dispatch.total-timeout-before-start-minutes=30
# 派单轮次距离阈值（公里）
app.dispatch.round1-distance-km=5
app.dispatch.round2-distance-km=10
app.dispatch.round3-distance-km=20
# 各轮次最低时间重叠率
app.dispatch.round1-time-overlap=0.8
app.dispatch.round2-time-overlap=0.6
# 派单定时任务轮询间隔（毫秒）
app.dispatch.scheduler-poll-interval-ms=5000
# 订单匹配超时：PENDING_MATCH 状态超过此时间开始通知盲人（秒，默认 5 分钟）
app.match.timeout-seconds=300
# 重新匹配超时：REMATCHING 状态超过此时间通知盲人（秒，默认 5 分钟）
app.rematch.timeout-seconds=300
# 订单创建提前量：预约开始时间必须距当前时间至少 N 分钟，否则拒绝（errorCode=APPOINTMENT_TOO_SOON，HTTP 422）
app.order.min-lead-time-minutes=30
# WebSocket 端点路径
app.websocket.endpoint=/ws/volunteer
app.websocket.blind-endpoint=/ws/blind
# 志愿者位置 Redis TTL（秒，超过此时间未更新视为离线）
app.volunteer.location-ttl-seconds=30

# ========================================
# 文件上传配置
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/tmp/blindrun-uploads/

# ========================================
# 邻近感知配置
# ========================================
app.proximity.threshold-meters=100

# ========================================
# 紧急事件配置
# ========================================
app.emergency.cooldown-seconds=60
app.emergency.volunteer-timeout-seconds=30

# ========================================
# 陪跑轨迹 + 走散检测配置
# ========================================
# 轨迹抽稀采样间隔（秒）：同一订单+角色在此窗口内只记一个轨迹点
app.track.sample-interval-seconds=10
# 走散检测阈值（米）：陪跑进行中双方坐标距离超过此值触发提醒 + 应急事件
app.escort.max-distance-meters=100

# ========================================
# 隐私号通话配置
# ========================================
aliyun.private-number.enabled=false

# ========================================
# 速率限制配置
# ========================================
rate-limit.enabled=true
rate-limit.auth.max-requests=10
rate-limit.auth.window-seconds=60
rate-limit.registration.max-requests=20
rate-limit.registration.window-seconds=60
rate-limit.general.max-requests=60
rate-limit.general.window-seconds=60

# ========================================
# Springdoc OpenAPI
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.operations-sorter=alpha

# ========================================
# 测试账号配置（前端联调专用）
# ========================================
# 列表中的号码验证码固定为 000000，不发真实短信
# 生产服务器通过 JVM 参数 -Dsms.test-phones=... 注入
sms.test-phones=


# ========================================
# 异步线程池配置（@Async 事件处理）
# ========================================
# 注意：实际生效的线程池由 AsyncConfig.java 中的 @Bean("taskExecutor") 定义
# （core=10, max=50, queue=200, CallerRunsPolicy）
# 下方 spring.task.execution.* 属性因 AsyncConfig 已提供 Executor Bean 而不生效，
# Spring Boot 的 TaskExecutionAutoConfiguration 会在检测到自定义 Executor 后自动退出。
# 调度线程池：DispatchScheduler / TimeoutScheduler 各占独立线程，避免互相阻塞
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduler-
