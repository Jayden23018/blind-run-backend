spring.application.name=demo
server.port=8081

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/spring_demo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
# ddl-auto=update: Hibernate 会根据实体类自动更新数据库表结构
# show-sql=true: 在控制台打印执行的 SQL 语句，方便调试
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# 初始化数据（data.sql 在 Hibernate 建表后执行）
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# ========================================
# 短信验证码配置
# ========================================
# 验证码位数（默认6位）
sms.code.length=6
# 验证码有效期（分钟，默认5分钟）
sms.code.ttl-minutes=5
# 验证码最大尝试次数（超过后验证码失效，需重新发送）
sms.code.max-attempts=5

# ========================================
# Redis 配置
# ========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

# ========================================
# 盲人陪跑匹配配置
# ========================================
# 匹配最大距离（公里）
app.matching.max-distance-km=10
# 匹配最大候选人数（最多推送给几名志愿者）
app.matching.max-candidates=3
# WebSocket 端点路径
app.websocket.endpoint=/ws/volunteer
# 志愿者位置 Redis TTL（秒，超过此时间未更新视为离线）
app.volunteer.location-ttl-seconds=30

# ========================================
# 文件上传配置
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/tmp/blindrun-uploads/

# ========================================
# 邻近感知配置
# ========================================
app.proximity.threshold-meters=100

# ========================================
# 紧急事件配置
# ========================================
app.emergency.cooldown-seconds=60
app.emergency.volunteer-timeout-seconds=30

# ========================================
# 隐私号通话配置
# ========================================
aliyun.private-number.enabled=false
