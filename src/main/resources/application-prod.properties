# 生产环境配置
# 使用方法：java -jar xxx.jar --spring.profiles.active=prod

# ========================================
# 短信服务配置（阿里云号码认证服务 - 免资质签名）
# ========================================
# 短信服务提供商：aliyun
sms.provider=aliyun

# 阿里云 AccessKey（建议使用环境变量，不要硬编码在代码中）
# 方式1：直接配置（仅用于测试，不推荐）
# aliyun.credentials.access-key-id=your-access-key-id
# aliyun.credentials.access-key-secret=your-access-key-secret

# 方式2：使用环境变量（推荐）
# Linux/Mac: export ALIYUN_ACCESS_KEY_ID=xxx && export ALIYUN_ACCESS_KEY_SECRET=xxx
# Windows: set ALIYUN_ACCESS_KEY_ID=xxx && set ALIYUN_ACCESS_KEY_SECRET=xxx

# 阿里云号码认证服务配置（免资质签名，无需审核）
aliyun.sms.region-id=cn-hangzhou
aliyun.sms.sign-name=阿里云通信
aliyun.sms.template-code=SMS_123456789

# ========================================
# 数据库配置（生产环境）
# ========================================
spring.datasource.url=jdbc:mysql://your-production-host:3306/spring_demo
spring.datasource.username=prod-user
spring.datasource.password=strong-password-here

# ========================================
# Redis 配置（生产环境）
# ========================================
spring.data.redis.host=your-redis-host
spring.data.redis.port=6379
spring.data.redis.password=your-redis-password

# ========================================
# 其他生产环境配置
# ========================================
# 关闭 SQL 日志（生产环境）
spring.jpa.show-sql=false
# 不执行 data.sql（生产环境已有数据）
spring.sql.init.mode=never
