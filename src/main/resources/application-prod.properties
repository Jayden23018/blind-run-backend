# 生产环境配置
# 使用方法：java -jar xxx.jar --spring.profiles.active=prod

# ========================================
# 短信服务配置（阿里云短信服务 Dysmsapi）
# ========================================
sms.provider=aliyun
aliyun.sms.sign-name=${ALIYUN_SMS_SIGN_NAME}
aliyun.sms.template-code.verify=SMS_190070387
aliyun.sms.template-code.emergency-alert=SMS_505635057
aliyun.sms.template-code.contact-added=SMS_505950033
aliyun.sms.template-code.emergency-resolved=SMS_505880026

# ========================================
# 数据库配置（生产环境）—— 通过环境变量注入
# ========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ========================================
# Redis 配置（生产环境）—— 通过环境变量注入
# ========================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# ========================================
# 其他生产环境配置
# ========================================
# 关闭 SQL 日志（生产环境）
spring.jpa.show-sql=false
# 不执行 data.sql（生产环境已有数据）
spring.sql.init.mode=never
# 关闭 Swagger（生产环境）
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
